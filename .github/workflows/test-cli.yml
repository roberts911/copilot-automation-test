name: Test Copilot CLI with Agent
on: workflow_dispatch

jobs:
  run-cli-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
          
      - name: Run Copilot CLI with Custom Agent
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          echo "=== Loading Agent and querying Copilot ==="
          
          # 1. Read the agent's instructions from the file into a variable
          AGENT_INSTRUCTIONS=$(cat .github/agents/my-agent.md)
          
          # 2. Pass the prompt using the -p flag, injecting the agent's instructions dynamically
          gh copilot -p "Adopt the following persona/rules:
          $AGENT_INSTRUCTIONS
          
          Now, execute this task: Design a secure, high-performance CI/CD pipeline for a modern web application. Include a diagram representing this workflow."
