name: Test Copilot CLI
on: workflow_dispatch

jobs:
  run-cli-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
          
      - name: Run Copilot CLI
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          echo "=== Wypisuję nową pomoc CLI ==="
          gh copilot --help
          
          echo -e "\n=== Testuję zapytanie do Copilota ==="
          # Próbujemy użyć bezpośredniego promptu (-p) zgodnie z sugestią Twojego kolegi
          gh copilot ask "List all markdown files in the repository. Answer in one sentence." || \
          gh copilot -p "List all markdown files in the repository. Answer in one sentence."
