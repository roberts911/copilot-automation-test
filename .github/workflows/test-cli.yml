name: Test Copilot CLI
on: workflow_dispatch

jobs:
  run-cli-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
          
      - name: Run Copilot CLI
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          # Używamy natywnej wbudowanej komendy
          gh copilot suggest -t shell "List all markdown files in the repository."
