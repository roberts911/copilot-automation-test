name: Test GitHub Models API
on: workflow_dispatch

jobs:
  run-api-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install requests

      - name: Run Agent via API
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          python << 'EOF'
          import os, requests, json
          
          # 1. Try to load custom agent instructions from the file
          agent_path = '.github/agents/my-agent.md'
          try:
              with open(agent_path, 'r') as f:
                  system_prompt = f.read()
              print(f"Successfully loaded agent instructions from {agent_path}")
          except FileNotFoundError:
              system_prompt = 'You are a helpful assistant.'
              print(f"Warning: {agent_path} not found. Falling back to default assistant.")
              
          token = os.environ.get('GITHUB_TOKEN')
          url = 'https://models.inference.ai.azure.com/chat/completions'
          
          headers = {
              'Authorization': f'Bearer {token}',
              'Content-Type': 'application/json'
          }
          
          payload = {
              'model': 'gpt-4o',
              'messages': [
                  {'role': 'system', 'content': system_prompt},
                  {'role': 'user', 'content': 'Design a secure, high-performance CI/CD pipeline for a modern web application. Include a diagram representing this workflow.'}
              ]
          }
          
          response = requests.post(url, headers=headers, json=payload)
          
          if response.status_code == 200:
              res_data = response.json()
              answer = res_data['choices'][0]['message']['content']
              usage = res_data.get('usage', {})
              
              # 2. Print the exact token usage
              print("\n=== Token Usage ===")
              print(f"Prompt Tokens: {usage.get('prompt_tokens', 0)}")
              print(f"Completion Tokens: {usage.get('completion_tokens', 0)}")
              print(f"Total Tokens: {usage.get('total_tokens', 0)}")
              
              # 3. Print the formatted response
              print('\n=== Copilot Response ===\n')
              print(answer)
          else:
              print(f'API Error: {response.status_code}')
              print(response.text)
          EOF
